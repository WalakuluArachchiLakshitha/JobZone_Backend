services:
  - type: web
    name: jobzone-backend
    runtime: node
    region: singapore  # closest to Sri Lanka
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set this manually in Render dashboard (never commit to Git)
      - key: JWT_SECRET
        sync: false  # Set this manually in Render dashboard
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ORIGINS
        sync: false  # Set to your Vercel URL after frontend is deployed
